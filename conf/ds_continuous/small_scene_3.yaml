defaults:
  - config
  - _self_

name: 'ds_small_scene_3'
rewrite: true
size_x: 12
size_y: 10
num_scenes: 1
num_workers: 1
layout_gen_type: PROCEDURAL_TENSOR_FIELD
randomize_layout: true
randomize_arrangements: true
output_dir: generated_envs/${ds_continuous.name}

random_seed: 142


active_shelvings_list:
  - name: 'mixed_shelf'
    shuffle_items_on_board: True
    shuffle_boards: True
    filling_type: BOARDWISE_COLUMNS
    x_gap: 0.08
    y_gap: 0.05
    noise_std_x: 0.01
    noise_std_y: 0.01
    rotation_lower: -0.3
    rotation_upper: 0.3
    delta_x: 0.1
    shelf_asset: fixtures.shelf_metal
    board_product_numcol:
      0:
        food.drinks.coffeePackaging1: 2
        food.ENERGY_DRINKS.MonsterEnergyDrink: 2
        food.QUICK_FOOD.Jin-RamenNoodles: 2
      1: 
        food.CRACKERS_COOKIES.BarryCallebautMilkChockolateChunks: 2
        food.CRACKERS_COOKIES.OreoLemonCremeSandwichCookies: 2
      2:
        food.MILK.ReducedFatMilk: 2
        food.HOUSEHOLD.VanishStainRemover: 2
        food.HYGIENE.KasivoideHandCream: 2
      3:
        food.drinks.coffeePaperBag: 2
        food.STRONG_ALCO.PierceRum: 2
        food.HOUSEHOLD.AviasParquetDetergent: 2
        
       

scene_fixtures_list: 
  - fixtures.freezer_nestle