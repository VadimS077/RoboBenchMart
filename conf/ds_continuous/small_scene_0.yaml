defaults:
  - config
  - _self_

name: 'ds_small_scene_0'
rewrite: true
size_x: 12
size_y: 10
num_scenes: 5
num_workers: 1
layout_gen_type: PROCEDURAL_TENSOR_FIELD
randomize_layout: true
randomize_arrangements: true
output_dir: generated_envs/${ds_continuous.name}

random_seed: 42


active_shelvings_list:
  - name: 'mixed_shelf'
    shuffle_items_on_board: True
    shuffle_boards: True
    filling_type: BOARDWISE_COLUMNS
    x_gap: 0.1
    y_gap: 0.05
    noise_std_x: 0.001
    noise_std_y: 0.001
    rotation_lower: -0.1
    rotation_upper: 0.1
    shelf_asset: fixtures.shelf_metal
    board_product_numcol:
      0:
        food.ENERGY_DRINKS.MonsterEnergyDrink: 3 

        food.HYGIENE.NiveaBodyMilk: 3

        food.HOUSEHOLD.AjaxDishSoap: 2 
      1:
        food.CANNED.HeinzBeansInARichTomatoSauce: 4
        food.CANNED.SlamLuncheonMeat: 4
      2:
        food.CRACKERS_COOKIES.OreoLemonCremeSandwichCookies: 3
        food.CRACKERS_COOKIES.BananiaCookies: 2
        food.CRACKERS_COOKIES.PockyMatcha: 2
      3:
        food.HOUSEHOLD.VanishStainRemover: 4
        food.BEER.DuffBeerCan: 3
        food.CANNED.HeinzBeansInARichTomatoSauce: 2

scene_fixtures_list: 
  - fixtures.freezer_nestle